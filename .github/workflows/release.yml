name: 'Create Draft Release for Tauri App'
on:
  workflow_dispatch:
permissions:
  contents: write
  issues: read
  pull-requests: read
jobs:
  prepare-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      changelog: ${{ steps.generate-changelog.outputs.changelog }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get version from tag
        id: get-version
        run: |
          version=$(git describe --tags --abbrev=0)
          echo "version=${version#v}" >> $GITHUB_OUTPUT
      - name: Generate changelog
        id: generate-changelog
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          previous_tag=$(git describe --tags --abbrev=0 HEAD^)
          echo "Changes since $previous_tag:" > CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "## Commits" >> CHANGELOG.md
          git log ${previous_tag}..HEAD --pretty=format:"* %s (%h)" >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "## Closed Issues" >> CHANGELOG.md
          gh issue list --state closed --search "closed:>=${previous_tag}" --json number,title --jq '.[] | "* \(.title) (#\(.number))"' >> CHANGELOG.md
          echo "" >> CHANGELOG.md
          echo "## Merged Pull Requests" >> CHANGELOG.md
          gh pr list --state merged --search "merged:>=${previous_tag}" --json number,title --jq '.[] | "* \(.title) (#\(.number))"' >> CHANGELOG.md
          cat CHANGELOG.md
          changelog=$(cat CHANGELOG.md)
          echo 'changelog<<EOF' >> $GITHUB_OUTPUT
          echo "$changelog" >> $GITHUB_OUTPUT
          echo 'EOF' >> $GITHUB_OUTPUT

  build-tauri:
    needs: prepare-release
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev libxdo-dev curl wget file
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'pnpm'
      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - name: Install dependencies
        run: pnpm install
      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0.5.10
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: app-v${{ needs.prepare-release.outputs.version }}
          releaseName: 'Release v${{ needs.prepare-release.outputs.version }}'
          releaseBody: ${{ needs.prepare-release.outputs.changelog }}
          releaseDraft: true
          prerelease: false