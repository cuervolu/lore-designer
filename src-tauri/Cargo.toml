[package]
name = "app"
version = "0.1.1"
description = "A Tauri App"
authors = ["Ángel Cuervo <cuervolu@protonmail.com>"]
license = "MIT"
repository = "https://github.com/cuervolu/lore-designer"
edition = "2021"
rust-version = "1.70"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[lib]
name = "app_lib"
crate-type = ["staticlib", "cdylib", "lib"]

[build-dependencies]
tauri-build = { version = "2.0.0-beta.19", features = [] }

[dependencies]
serde_json = "1.0"
serde = { version = "1.0", features = ["derive"] }
log = "0.4.22"
tauri = { version = "2.0.0-beta.24", features = ["protocol-asset"] }
tauri-plugin-devtools = { version = "2.0.0-beta.5" }
tauri-plugin-log = { version = "2.0.0-beta.9", features = ["colored"] }
tauri-plugin-fs = "2.0.0-beta.0"
tauri-plugin-sql = { version = "2.0.0-beta.0", features = ["sqlite"] }
tauri-plugin-os = "2.0.0-beta.0"
tauri-plugin-shell = "2.0.0-beta.0"
tauri-plugin-store = "2.0.0-beta.0"
tauri-plugin-window-state = "2.0.0-beta"
tauri-plugin-dialog = "2.0.0-beta.0"
tauri-plugin-clipboard-manager = "2.0.0-beta.0"
thiserror = "1.0.62"
anyhow = "1.0.86"
font-kit = "0.14.1"
chrono = "0.4.38"
uuid = { version = "1.10.0", features = ["v4"] }
sqlx = { version = "0.8.0", features = ["runtime-tokio-native-tls", "sqlite", "chrono"] }
reqwest = { version = "0.12.5", features = ["json"] }

[profile.dev]
incremental = true # Compile your binary in smaller steps.

[profile.release]
codegen-units = 1 # Allows LLVM to perform better optimization.
lto = true # Enables link-time-optimizations.
opt-level = "s" # Prioritizes small binary size. Use `3` if you prefer speed.
panic = "abort" # Higher performance by disabling panic handlers.
strip = true # Ensures debug symbols are removed.

[target."cfg(not(any(target_os = \"android\", target_os = \"ios\")))".dependencies]
tauri-plugin-updater = "2.0.0-beta.0"

